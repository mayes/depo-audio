[package]
name = "depo-audio"
version = "0.1.1"
description = "DepoAudio — Court Recording Audio Converter"
authors = ["Andrew Mayes <andrew@executivereportingservice.com>"]
license = "MIT"
repository = "https://github.com/mayes/depo-audio"
edition = "2021"
rust-version = "1.77.2"

[lib]
name = "depo_audio_lib"
crate-type = ["staticlib", "cdylib", "rlib"]

[build-dependencies]
tauri-build = { version = "2", features = [] }

[dependencies]
tauri        = { version = "2", features = [] }
tauri-plugin-shell  = "2"
tauri-plugin-dialog = "2"
tauri-plugin-fs     = "2"
tauri-plugin-drag-drop = "2"
tauri-plugin-opener = "2"

serde        = { version = "1", features = ["derive"] }
serde_json   = "1"
uuid         = { version = "1", features = ["v4"] }
chrono       = { version = "0.4", features = ["serde"] }
regex        = "1"
tokio        = { version = "1", features = ["full"] }

[profile.release]
opt-level   = 3
strip       = true
lto         = true
codegen-units = 1
panic       = "abort"
