name: Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:

jobs:
  release:
    permissions:
      contents: write

    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest       # Apple Silicon
            args: '--target aarch64-apple-darwin'
            rust-target: aarch64-apple-darwin
          - platform: macos-13           # Intel Mac
            args: '--target x86_64-apple-darwin'
            rust-target: x86_64-apple-darwin
          - platform: windows-latest     # Windows x64
            args: ''
            rust-target: ''

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install frontend deps
        run: npm ci

      # ── Place FFmpeg sidecars ──────────────────────────────────────────────
      # Download pre-built FFmpeg binaries and rename them to Tauri sidecar convention.
      # Tauri expects: binaries/ffmpeg-<target-triple>[.exe]

      - name: Download FFmpeg (macOS aarch64)
        if: matrix.rust-target == 'aarch64-apple-darwin'
        run: |
          curl -L "https://evermeet.cx/ffmpeg/getrelease/ffmpeg/zip" -o ffmpeg.zip
          curl -L "https://evermeet.cx/ffmpeg/getrelease/ffprobe/zip" -o ffprobe.zip
          unzip -o ffmpeg.zip  -d src-tauri/binaries && mv src-tauri/binaries/ffmpeg  src-tauri/binaries/ffmpeg-aarch64-apple-darwin
          unzip -o ffprobe.zip -d src-tauri/binaries && mv src-tauri/binaries/ffprobe src-tauri/binaries/ffprobe-aarch64-apple-darwin
          chmod +x src-tauri/binaries/ffmpeg-aarch64-apple-darwin src-tauri/binaries/ffprobe-aarch64-apple-darwin

      - name: Download FFmpeg (macOS x86_64)
        if: matrix.rust-target == 'x86_64-apple-darwin'
        run: |
          curl -L "https://evermeet.cx/ffmpeg/getrelease/ffmpeg/zip" -o ffmpeg.zip
          curl -L "https://evermeet.cx/ffmpeg/getrelease/ffprobe/zip" -o ffprobe.zip
          unzip -o ffmpeg.zip  -d src-tauri/binaries && mv src-tauri/binaries/ffmpeg  src-tauri/binaries/ffmpeg-x86_64-apple-darwin
          unzip -o ffprobe.zip -d src-tauri/binaries && mv src-tauri/binaries/ffprobe src-tauri/binaries/ffprobe-x86_64-apple-darwin
          chmod +x src-tauri/binaries/ffmpeg-x86_64-apple-darwin src-tauri/binaries/ffprobe-x86_64-apple-darwin

      - name: Download FFmpeg (Windows)
        if: matrix.platform == 'windows-latest'
        shell: pwsh
        run: |
          $url = "https://github.com/BtbN/FFmpeg-Builds/releases/download/latest/ffmpeg-master-latest-win64-gpl.zip"
          Invoke-WebRequest $url -OutFile ffmpeg.zip
          Expand-Archive ffmpeg.zip -DestinationPath ffmpeg_tmp -Force
          $bin = Get-ChildItem ffmpeg_tmp -Recurse -Filter "ffmpeg.exe" | Select-Object -First 1
          $probe = Get-ChildItem ffmpeg_tmp -Recurse -Filter "ffprobe.exe" | Select-Object -First 1
          Copy-Item $bin.FullName  src-tauri/binaries/ffmpeg-x86_64-pc-windows-msvc.exe
          Copy-Item $probe.FullName src-tauri/binaries/ffprobe-x86_64-pc-windows-msvc.exe

      # ── Build & release ────────────────────────────────────────────────────
      - name: Build and release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # macOS signing (optional — set in repo secrets for notarized builds)
          APPLE_CERTIFICATE:            ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD:   ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY:       ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID:                     ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD:               ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID:                ${{ secrets.APPLE_TEAM_ID }}
        with:
          tagName:        ${{ github.ref_name }}
          releaseName:    'DepoAudio ${{ github.ref_name }}'
          releaseBody:    'See CHANGELOG.md for details.'
          releaseDraft:   true
          prerelease:     false
          args:           ${{ matrix.args }}
