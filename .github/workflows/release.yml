name: Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag to create (e.g. v0.8.0)'
        required: true
        type: string

env:
  ORT_VERSION: "1.22.0"

jobs:
  release:
    permissions:
      contents: write

    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: '--target aarch64-apple-darwin'
            rust-target: aarch64-apple-darwin
            ort-url: 'https://github.com/microsoft/onnxruntime/releases/download/v1.22.0/onnxruntime-osx-arm64-1.22.0.tgz'
            ort-lib: 'libonnxruntime.1.22.0.dylib'
            ort-dest: 'libonnxruntime.dylib'
          - platform: macos-latest
            args: '--target x86_64-apple-darwin'
            rust-target: x86_64-apple-darwin
            ort-url: 'https://github.com/microsoft/onnxruntime/releases/download/v1.22.0/onnxruntime-osx-x86_64-1.22.0.tgz'
            ort-lib: 'libonnxruntime.1.22.0.dylib'
            ort-dest: 'libonnxruntime.dylib'
          - platform: windows-latest
            args: ''
            rust-target: x86_64-pc-windows-msvc
            ort-url: 'https://github.com/microsoft/onnxruntime/releases/download/v1.22.0/onnxruntime-win-x64-1.22.0.zip'
            ort-lib: 'onnxruntime.dll'
            ort-dest: 'onnxruntime.dll'

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v6

      - name: Install Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install frontend deps
        run: npm ci

      - name: Create binaries directory
        run: mkdir -p src-tauri/binaries

      # ── FFmpeg sidecars ─────────────────────────────────────────────────
      - name: Install FFmpeg (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install ffmpeg
          cp "$(which ffmpeg)"  "src-tauri/binaries/ffmpeg-${{ matrix.rust-target }}"
          cp "$(which ffprobe)" "src-tauri/binaries/ffprobe-${{ matrix.rust-target }}"
          chmod +x "src-tauri/binaries/ffmpeg-${{ matrix.rust-target }}" \
                   "src-tauri/binaries/ffprobe-${{ matrix.rust-target }}"

      - name: Download FFmpeg (Windows x64)
        if: matrix.platform == 'windows-latest'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path src-tauri/binaries | Out-Null
          $url = "https://github.com/BtbN/FFmpeg-Builds/releases/download/latest/ffmpeg-master-latest-win64-gpl.zip"
          Invoke-WebRequest $url -OutFile ffmpeg.zip
          Expand-Archive ffmpeg.zip -DestinationPath ffmpeg_tmp -Force
          $bin   = Get-ChildItem ffmpeg_tmp -Recurse -Filter "ffmpeg.exe"  | Select-Object -First 1
          $probe = Get-ChildItem ffmpeg_tmp -Recurse -Filter "ffprobe.exe" | Select-Object -First 1
          Copy-Item $bin.FullName   src-tauri/binaries/ffmpeg-x86_64-pc-windows-msvc.exe
          Copy-Item $probe.FullName src-tauri/binaries/ffprobe-x86_64-pc-windows-msvc.exe

      - name: Verify FFmpeg sidecars (Unix)
        if: runner.os != 'Windows'
        run: |
          echo "=== src-tauri/binaries/ ==="
          ls -lh src-tauri/binaries/
          file src-tauri/binaries/ff* || true

      - name: Verify FFmpeg sidecars (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: Get-ChildItem src-tauri/binaries/

      # ── ONNX Runtime ────────────────────────────────────────────────────
      - name: Download ONNX Runtime (macOS)
        if: runner.os == 'macOS'
        run: |
          mkdir -p src-tauri/resources/onnxruntime
          curl -fsSL --retry 3 "${{ matrix.ort-url }}" -o ort.tgz
          tar xzf ort.tgz
          ORT_DIR=$(ls -d onnxruntime-*)
          cp "$ORT_DIR/lib/${{ matrix.ort-lib }}" "src-tauri/resources/onnxruntime/${{ matrix.ort-dest }}"
          ls -lh src-tauri/resources/onnxruntime/

      - name: Download ONNX Runtime (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path src-tauri/resources/onnxruntime | Out-Null
          Invoke-WebRequest "${{ matrix.ort-url }}" -OutFile ort.zip
          Expand-Archive ort.zip -DestinationPath ort_tmp -Force
          $dll = Get-ChildItem ort_tmp -Recurse -Filter "${{ matrix.ort-lib }}" | Select-Object -First 1
          Copy-Item $dll.FullName "src-tauri/resources/onnxruntime/${{ matrix.ort-dest }}"
          Get-ChildItem src-tauri/resources/onnxruntime/

      # ── Disable macOS signing when no certificate is configured ────────
      - name: Disable macOS code signing (unsigned build)
        if: runner.os == 'macOS'
        run: echo "APPLE_SIGNING_IDENTITY=-" >> $GITHUB_ENV

      # ── Signed auto-updates: only when the signing key secret is set ───
      # Building updater artifacts requires TAURI_SIGNING_PRIVATE_KEY; gating on
      # it means a release still succeeds before the maintainer configures the
      # key (updates are simply dormant until then) and turns on automatically
      # once the secret exists.
      - name: Detect updater signing key
        id: updater
        shell: bash
        env:
          SIGNING_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
        run: |
          if [ -n "$SIGNING_KEY" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "::notice::TAURI_SIGNING_PRIVATE_KEY not set — building without auto-update artifacts."
          fi

      # ── Build & release ────────────────────────────────────────────────
      - name: Build and release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Updater artifact signing. Set these repo secrets to enable signed
          # auto-updates (generate with: npx tauri signer generate).
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName:      ${{ inputs.tag || github.ref_name }}
          releaseName:  'DepoAudio ${{ inputs.tag || github.ref_name }}'
          releaseBody:  'See CHANGELOG.md for details.'
          releaseDraft: true
          prerelease:   false
          # Updater artifacts + latest.json only when the signing key is present.
          includeUpdaterJson: ${{ steps.updater.outputs.enabled }}
          args: ${{ steps.updater.outputs.enabled == 'true' && format('--config src-tauri/tauri.updater.conf.json {0}', matrix.args) || matrix.args }}
