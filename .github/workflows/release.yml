name: Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:

jobs:
  release:
    permissions:
      contents: write

    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest    # Apple Silicon (arm64) — native arm64 runner
            args: '--target aarch64-apple-darwin'
            rust-target: aarch64-apple-darwin
          - platform: macos-13        # Intel Mac (x86_64) — native x86_64 runner
            args: '--target x86_64-apple-darwin'
            rust-target: x86_64-apple-darwin
          - platform: windows-latest  # Windows x64
            args: ''
            rust-target: x86_64-pc-windows-msvc

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install frontend deps
        run: npm ci

      # ── Create binaries directory (must exist before FFmpeg steps) ─────────
      - name: Create binaries directory
        run: mkdir -p src-tauri/binaries

      # ── Place FFmpeg sidecars ──────────────────────────────────────────────
      # Tauri sidecar convention: binaries/ffmpeg-<target-triple>[.exe]
      #
      # macOS:   brew install on native runners (arm64 on macos-latest, x86_64 on macos-13)
      # Windows: static GPL build from BtbN/FFmpeg-Builds

      - name: Install FFmpeg (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install ffmpeg
          cp "$(which ffmpeg)"  "src-tauri/binaries/ffmpeg-${{ matrix.rust-target }}"
          cp "$(which ffprobe)" "src-tauri/binaries/ffprobe-${{ matrix.rust-target }}"
          chmod +x "src-tauri/binaries/ffmpeg-${{ matrix.rust-target }}" \
                   "src-tauri/binaries/ffprobe-${{ matrix.rust-target }}"

      - name: Download FFmpeg (Windows x64)
        if: matrix.platform == 'windows-latest'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path src-tauri/binaries | Out-Null
          $url = "https://github.com/BtbN/FFmpeg-Builds/releases/download/latest/ffmpeg-master-latest-win64-gpl.zip"
          Invoke-WebRequest $url -OutFile ffmpeg.zip
          Expand-Archive ffmpeg.zip -DestinationPath ffmpeg_tmp -Force
          $bin   = Get-ChildItem ffmpeg_tmp -Recurse -Filter "ffmpeg.exe"  | Select-Object -First 1
          $probe = Get-ChildItem ffmpeg_tmp -Recurse -Filter "ffprobe.exe" | Select-Object -First 1
          Copy-Item $bin.FullName   src-tauri/binaries/ffmpeg-x86_64-pc-windows-msvc.exe
          Copy-Item $probe.FullName src-tauri/binaries/ffprobe-x86_64-pc-windows-msvc.exe

      # ── Verify sidecars were placed ────────────────────────────────────────
      - name: Verify FFmpeg sidecars (Unix)
        if: runner.os != 'Windows'
        run: |
          echo "=== src-tauri/binaries/ ==="
          ls -lh src-tauri/binaries/
          file src-tauri/binaries/ff* || true

      - name: Verify FFmpeg sidecars (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: Get-ChildItem src-tauri/binaries/

      # ── Build & release ────────────────────────────────────────────────────
      - name: Build and release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # macOS signing — set repo secrets for notarized builds
          APPLE_CERTIFICATE:          ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY:     ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID:                   ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD:             ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID:              ${{ secrets.APPLE_TEAM_ID }}
          # Tauri updater signing
          TAURI_SIGNING_PRIVATE_KEY:          ${{ secrets.TAURI_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_KEY_PASSWORD }}
        with:
          tagName:      ${{ github.ref_name }}
          releaseName:  'DepoAudio ${{ github.ref_name }}'
          releaseBody:  'See CHANGELOG.md for details.'
          releaseDraft: true
          prerelease:   false
          args:         ${{ matrix.args }}
